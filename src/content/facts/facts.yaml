- topic: "abiul"
  title: "Royal Charter of 1167"
  body: "Abiul received its first royal charter (foral) in 1167 from King Afonso Henriques, making it one of the oldest documented settlements in the region."
  source_url: "https://en.wikipedia.org/wiki/Abiul"
  verified: true

- topic: "abiul"
  title: "House of Aveiro Connection"
  body: "Abiul was historically linked to the powerful House of Aveiro, a noble family that played a significant role in Portuguese history until the Távora affair in the 18th century."
  source_url: "https://en.wikipedia.org/wiki/Abiul"
  verified: true

- topic: "abiul"
  title: "Festa do Bodo"
  body: "The Festa do Bodo is Abiul's most important traditional festival, originating from a medieval plague-vow tradition where the community promised to hold an annual feast in gratitude for being spared from the Black Death."
  source_url: "https://en.wikipedia.org/wiki/Abiul"
  verified: true

- topic: "abiul"
  title: "Oldest Bullring in Portugal"
  body: "Abiul is home to what is believed to be the oldest bullring (praça de touros) in Portugal, a testament to the town's deep-rooted cultural traditions."
  source_url: "https://en.wikipedia.org/wiki/Abiul"
  verified: true

- topic: "pombal"
  title: "Pombal Castle — Knights Templar Fortress"
  body: "Pombal Castle is a medieval castle built by the Knights Templar in the 12th century. It was part of a line of defensive fortifications protecting the Coimbra-Leiria region during the Reconquista."
  source_url: "https://en.wikipedia.org/wiki/Pombal,_Portugal"
  verified: true

- topic: "pombal"
  title: "Marquês de Pombal Connection"
  body: "The town gave its name to Sebastião José de Carvalho e Melo, the 1st Marquês de Pombal, the powerful 18th-century prime minister who rebuilt Lisbon after the 1755 earthquake."
  source_url: "https://en.wikipedia.org/wiki/Pombal,_Portugal"
  verified: true

- topic: "pombal"
  title: "Távora Affair"
  body: "Pombal was at the centre of the Távora affair (1758-1759), a political scandal that led to the execution of the powerful Távora family and consolidated the Marquês de Pombal's power."
  source_url: "https://en.wikipedia.org/wiki/Pombal,_Portugal"
  verified: true

- topic: "region"
  title: "4 UNESCO Sites Within 30 Minutes"
  body: "Casa dos Duques is perfectly located to explore four UNESCO World Heritage sites within a 30-minute drive: Batalha Monastery, Alcobaça Monastery, Tomar (Convent of Christ), and the University of Coimbra."
  verified: true

- topic: "region"
  title: "Central Portugal — Where History Meets Nature"
  body: "The region around Pombal offers an extraordinary diversity: from Roman ruins at Conímbriga and medieval castles to world-class beaches, dramatic limestone caves, and the schist villages (Aldeias do Xisto) of the interior."
  verified: true
